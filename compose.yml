services:
  db:
    image: postgres:15
    container_name: db
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: ratemate_api
    volumes:
      - pg_data:/var/lib/postgresql/data


  app:
    container_name: ratemate
    build: .
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgres://user:password@db:5432/ratemate_api
    depends_on:
      - db


volumes:
  pg_data: